name: Update Stats SVG
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
jobs:
  stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Generate stats SVG
        run: |
          curl -s "https://github-readme-stats.vercel.app/api?username=KedyCodeur&show_icons=true&theme=dark&hide_border=true" > stats.svg
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add stats.svg
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update stats SVG" && git push)
